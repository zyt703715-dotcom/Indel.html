<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova的魔法試煉：童心星網版</title>
    <!-- 母親引入的光速傳輸陣 (MQTT) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --magic: #8e44ad;
            --bg: #f4f6f7;
            --color-blue: #3498db;
            --color-yellow: #f1c40f;
        }
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: #2c3e50;
            padding: 20px;
            text-align: center;
            margin: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle, #e8f8f5 0%, #d4e6f1 100%);
            overflow-x: hidden;
            box-sizing: border-box;
        }
        * { box-sizing: inherit; }

        /* 導航列放大，適應 iPad 觸控 */
        .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 20px; align-items: center; }
        .nav-buttons button { padding: 15px 25px; font-size: 18px; border: 2px solid transparent; background: var(--primary); color: white; border-radius: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-buttons button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
        .nav-buttons button.active-nav { background: var(--magic); border: 2px solid white; box-shadow: 0 0 15px rgba(142,68,173,0.5); }

        /* 卡片容器 */
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: none; margin: 0 auto 20px auto; max-width: 900px; border: 1px solid #dcdde1; }
        .active { display: block; }

        select, input { margin: 10px 0; padding: 15px; width: 100%; max-width: 400px; font-size: 18px; border-radius: 10px; border: 2px solid #bdc3c7; }
        .action-btn { background: #e67e22; color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; font-size: 18px; width: 100%; max-width: 400px; border-radius: 10px; margin-top: 10px; box-shadow: 0 6px 0 #d35400, 0 10px 10px rgba(0,0,0,0.2); transition: 0.1s; position: relative; }
        .action-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #d35400, 0 4px 4px rgba(0,0,0,0.2); }

        .result-box { margin-top: 20px; padding: 20px; background: #fdfefe; border-radius: 12px; min-height: 100px; text-align: left; border-left: 6px solid var(--magic); line-height: 1.8; font-size: 20px; }

        /* 地圖網格與封印 */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .map-point { padding: 25px; border-radius: 16px; display: flex; flex-direction: column; align-items: flex-start; box-shadow: 0 6px 15px rgba(0,0,0,0.08); border: 2px solid #eee; background-color: #ffffff; position: relative; }
        .map-point.locked { background: #ecf0f1 !important; border: 2px dashed #95a5a6 !important; filter: grayscale(80%); }
        .map-point .title { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #2c3e50; }
        .lock-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 4px 0 #c0392b; transition: 0.1s; }
        .lock-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #c0392b; }
        .locked-btn-style { background: #27ae60; box-shadow: 0 4px 0 #2196f3; }
        .locked-btn-style:active { box-shadow: 0 0px 0 #2196f3; }

        /* ================= 超華麗魔法陣背景 (共用) ================= */
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .fullscreen-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(-45deg, #1e0b2d, #0f1c3f, #2a0845, #112240);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }
        .magic-circle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90vmin; height: 90vmin; pointer-events: none; z-index: 1; }
        .ring-outer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; border: 15px dashed rgba(241, 196, 15, 0.4); box-shadow: 0 0 50px rgba(241, 196, 15, 0.5), inset 0 0 50px rgba(241, 196, 15, 0.3); animation: spinRight 30s linear infinite; }
        .ring-middle { position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; border-radius: 50%; border: 8px solid rgba(142, 68, 173, 0.6); box-shadow: 0 0 60px rgba(142, 68, 173, 0.8), inset 0 0 40px rgba(142, 68, 173, 0.5); background-image: repeating-conic-gradient(from 0deg, transparent 0deg 30deg, rgba(255,255,255,0.1) 30deg 60deg); animation: spinLeft 40s linear infinite; }
        .ring-inner { position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; border-radius: 50%; border: 6px double rgba(52, 152, 219, 0.8); box-shadow: 0 0 40px rgba(52, 152, 219, 0.6); animation: spinRight 20s linear infinite; }
        @keyframes spinRight { 100% { transform: rotate(360deg); } }
        @keyframes spinLeft { 100% { transform: rotate(-360deg); } }

        /* 懸浮面板 (空間摺疊魔法：固定外框與內部滾動) */
        .glass-panel {
            position: relative; z-index: 2; background: rgba(10, 10, 25, 0.7); border: 3px solid rgba(142, 68, 173, 0.6);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(142, 68, 173, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; text-align: center; color: white;
            width: 85%; max-width: 800px; max-height: 90vh; /* 限制最大高度 */
            display: flex; flex-direction: column; /* 啟用上下彈性佈局 */
        }

        /* 締結契約專用樣式 */
        .glass-panel h1 { font-size: 42px; margin-top: 0; margin-bottom: 10px; color: #f1c40f; text-shadow: 0 0 20px rgba(241,196,15,0.8); flex-shrink: 0; }
        .glass-panel-header { flex-shrink: 0; } /* 確保上面不會被壓縮 */
        .huge-input { background: rgba(255,255,255,0.15); border: 3px solid rgba(255,255,255,0.4); color: #fff; font-size: 30px; padding: 20px; height: 75px; border-radius: 20px; width: 90%; max-width: 600px; font-weight: bold; margin-bottom: 10px; box-sizing: border-box;}
        .huge-input::placeholder { color: #ccc; font-weight: normal;}
        .color-selector { display: flex; justify-content: center; gap: 50px; margin: 20px 0; flex-shrink: 0;}
        .color-option { width: 90px; height: 90px; border-radius: 50%; cursor: pointer; border: 5px solid rgba(255,255,255,0.2); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .color-option[data-color="blue"] { background: radial-gradient(circle at 30% 30%, #5dade2, #2980b9); }
        .color-option[data-color="yellow"] { background: radial-gradient(circle at 30% 30%, #f4d03f, #d35400); }
        .color-option.selected { border-color: white; transform: scale(1.2); box-shadow: 0 0 40px white; }

        /* 滾動區與底部按鈕 */
        .scrollable-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; padding-right: 10px;}
        .scrollable-list::-webkit-scrollbar { width: 8px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
        .glass-panel-footer { flex-shrink: 0; margin-top: 20px; }

        /* 全螢幕事件劇場專用樣式 */
        #eventFullscreen .glass-panel { max-width: 1000px; width: 95%; height: 85vh; padding: 40px 50px; }
        #fsEventStep1 { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; }
        #fsEventStep2 { display: none; flex-direction: column; height: 100%; } /* 純故事版面 */

        #fsEventTitle { font-size: 36px; color: #3498db; text-shadow: 0 0 20px rgba(52,152,219,0.9); margin-bottom: 30px; line-height: 1.4; font-weight:bold;}
        #fsAiResult { flex-grow: 1; overflow-y: auto; margin-top: 10px; padding: 30px; background: rgba(0,0,0,0.4); border-radius: 20px; border-top: 6px solid #8e44ad; text-align: left; font-size: 26px; line-height: 1.8; color: #ecf0f1; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }

        .btn-enter-world { background: transparent; border: 3px solid white; color: white; padding: 15px 35px; border-radius: 40px; font-size: 22px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-enter-world:hover { background: white; color: #2c3e50; box-shadow: 0 0 20px white; }

        /* 星雲同步與其他彈窗 */
        .sync-badge { position: fixed; top: 10px; right: 20px; background: #27ae60; color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; z-index: 1000; display: none; font-weight: bold; }
        #syncStatusUI { margin: 20px auto; padding: 15px; border-radius: 10px; max-width: 400px; text-align: left; border: 2px solid transparent; background: #f4f6f7; border-color: #bdc3c7; color: #2c3e50; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1001; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; text-align: left; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px; margin: 8px 0; border-radius: 8px; border-left: 5px solid var(--magic); }
        .item-used { opacity: 0.6; border-left-color: #95a5a6; background: #eaecee; }
        .item-used .item-name, .item-used .item-desc { text-decoration: line-through; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="syncStatus" class="sync-badge">⚡ 宇宙星星已連線</div>

    <!-- =============== 全螢幕 1：締結契約 (不被頂上去的摺疊版面) =============== -->
    <div id="teamFullscreen" class="fullscreen-overlay">
        <div class="magic-circle-container"><div class="ring-outer"></div><div class="ring-middle"></div><div class="ring-inner"></div></div>
        <div class="glass-panel">
            <div class="glass-panel-header">
                <h1>✨ 締結魔法契約 ✨</h1>
                <p style="font-size: 20px; margin-bottom: 15px; margin-top:0;">勇敢的小法師們，請在此留下你們的名字！</p>
                <input type="text" id="newTeamName" class="huge-input" placeholder="輸入小隊名稱...">
                <div class="color-selector">
                    <div class="color-option" data-color="blue" onclick="selectColor(this)"></div>
                    <div class="color-option" data-color="yellow" onclick="selectColor(this)"></div>
                </div>
                <button class="action-btn" onclick="addTeam()" style="background: #8e44ad; font-size:24px; padding:15px; width:80%; max-width:400px; border:2px solid white; box-shadow:0 6px 0 #6c3483;">➕ 寫入星盤</button>
            </div>

            <!-- 大量隊伍只會在這裡面滾動，不會擠壓上面元素 -->
            <div id="teamListContainer" class="scrollable-list"></div>

            <div class="glass-panel-footer">
                <button class="btn-enter-world" onclick="closeTeamModal()">💫 準備好了！打開星圖 💫</button>
            </div>
        </div>
    </div>

    <!-- =============== 全螢幕 2：沉浸式奇遇劇場 (雙幕劇) =============== -->
    <div id="eventFullscreen" class="fullscreen-overlay">
        <div class="magic-circle-container"><div class="ring-outer"></div><div class="ring-middle"></div><div class="ring-inner"></div></div>
        <div class="glass-panel">

            <!-- 第一幕：抽取奇遇與輸入動作 -->
            <div id="fsEventStep1">
                <h1 style="margin-top:0; color:#f1c40f; text-shadow:0 0 20px #f1c40f; font-size:48px;">🔮 秘境奇遇</h1>
                <div id="fsEventTitle"></div>
                <input type="text" id="fsPlayerAction" class="huge-input" style="margin-top:30px;" placeholder="小朋友做了什麼呢？">

                <div style="display:flex; gap:20px; margin-top:40px; justify-content:center; width:100%;">
                    <button class="btn-enter-world" onclick="closeEventFullscreen()" style="background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; width:180px;">✖ 放棄返回</button>
                    <button class="action-btn" onclick="submitToAIFullscreen()" style="background: #27ae60; font-size:26px; padding:20px 40px; border:2px solid white; max-width:400px; margin:0; box-shadow:0 6px 0 #1e8449;">✨ 提交給魔法嚮導 ✨</button>
                </div>
            </div>

            <!-- 第二幕：純粹的故事畫卷 (隱藏所有多餘按鈕與輸入框) -->
            <div id="fsEventStep2">
                <h2 style="color:#f1c40f; margin-top:0; font-size:32px; letter-spacing:2px; text-shadow:0 0 10px #f1c40f;">📖 魔法故事書</h2>
                <div id="fsAiResult">準備編織故事...</div>
                <div class="glass-panel-footer" style="margin-top:30px;">
                    <button id="fsStoryCloseBtn" class="btn-enter-world" onclick="closeEventFullscreen()" style="display:none; background:#8e44ad; border-color:white; box-shadow:0 0 15px rgba(255,255,255,0.4);">✨ 故事結束，返回星圖 ✨</button>
                </div>
            </div>

        </div>
    </div>

    <!-- 主畫面與導航 -->
    <div class="nav-buttons">
        <button onclick="openInventory()" style="background:#d35400; font-weight:bold; border-color:#f39c12;">🎒 聖物圖鑑</button>
        <button onclick="openTeamModal()" style="background:#2980b9; font-weight:bold;">👥 創建隊伍</button>
        <button id="btn-map" onclick="switchTab('map')" class="active-nav">🗺️ 星圖疆域</button>
        <button id="btn-trpg" onclick="switchTab('trpg')">🔮 探索秘境</button>
        <button id="btn-npc" onclick="switchTab('npc')">🎁 神匣賜福</button>
        <button id="btn-settings" onclick="switchTab('settings')">⚙️ 神殿中樞</button>
    </div>

    <!-- =============== 中樞設定 =============== -->
    <div id="settings" class="card">
        <h3 style="color: var(--magic);">⚙️ 神殿中樞 (終極光速版)</h3>
        <div id="syncStatusUI">📡 <b>等待星塵連結輸入...</b></div>
        <input type="text" id="syncCodeInput" placeholder="房間秘密咒語 (如: nova123)">
        <hr style="border:0; border-top:1px solid #ddd; margin: 20px 0;">
        <input type="password" id="apiKeyInput" placeholder="請貼上 DeepSeek API 金鑰">
        <input type="text" id="apiUrlInput" value="https://api.deepseek.com/v1/chat/completions" placeholder="API URL">
        <button class="action-btn" onclick="saveSettings()" style="background: var(--magic);">✨ 啟動光速同步陣列</button>
        <button class="action-btn" onclick="clearAllData()" style="background: #c0392b; margin-top:20px;">⚠️ 清空並重置世界</button>
    </div>

    <!-- =============== 星圖據點 =============== -->
    <div id="map" class="card active" style="max-width: 900px;">
        <h3>🗺️ 星圖疆域</h3>
        <p style="color:#7f8c8d; font-size:14px;">工作人員可使用右上角按鈕將據點「鎖住停玩一輪」。</p>
        <div id="mapContainer" class="map-grid"></div>
    </div>

    <!-- =============== 探索秘境 (卡片介面) =============== -->
    <div id="trpg" class="card">
        <h3>🔮 探索秘境：觸發事件</h3>
        <p style="color:#7f8c8d; font-size:16px;">選擇隊伍與區域，然後開啟全螢幕的奇遇劇場！</p>
        <select id="eventTeamSelect"><option value="">-- 請選擇玩遊戲的隊伍 --</option></select>
        <select id="zoneSelect">
            <option value="精靈迷航森林">🌳 精靈的奇妙森林</option>
            <option value="巨龍隕落廢墟">🐉 睡著巨龍的廢墟</option>
            <option value="星光幻影湖泊">🌊 閃閃發光的湖泊</option>
            <option value="狂風元素高地">🌪️ 吹著大風的高地</option>
        </select>
        <button class="action-btn" onclick="openEventFullscreen()" style="background:#8e44ad;">🎬 進入全螢幕劇場！</button>
    </div>

    <!-- =============== NPC 法寶 =============== -->
    <div id="npc" class="card">
        <h3>🎁 神匣賜福 (抽道具)</h3>
        <select id="npcTeamSelect"><option value="">-- 領取道具的隊伍 --</option></select>
        <button class="action-btn" onclick="giveItem()">🌟 抽一個神奇法寶</button>
        <div id="itemResult" class="result-box" style="text-align: center;">還沒有抽喔...</div>
    </div>

    <!-- =============== 背包彈窗 Modal =============== -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeInventory()">✖ 關閉</button>
            <h2 style="color: var(--magic); margin-top: 0;">🎒 小隊的寶物包包</h2>
            <p style="font-size: 14px; color: #7f8c8d;">點擊消耗後，道具會被<span style="text-decoration:line-through;">畫掉</span>留作紀錄喔。</p>
            <div id="inventoryContainer"></div>
        </div>
    </div>

    <script>
        let config = { apiKey: "", apiUrl: "", syncCode: "" };
        let gameState = {
            timestamp: 0, teams: [],
            mapPoints: [
                { id: 'p1', name: '📍 精靈森林', ownerId: '', isLocked: false },
                { id: 'p2', name: '📍 巨龍廢墟', ownerId: '', isLocked: false },
                { id: 'p3', name: '📍 閃光湖泊', ownerId: '', isLocked: false },
                { id: 'p4', name: '📍 大風高地', ownerId: '', isLocked: false }
            ]
        };

        const destinies = [
            { text: "【星辰眷顧】(好)", desc: "天神給了小朋友禮物！由工作人員幫這個小隊加分！" },
            { text: "【神匣餽贈】(好)", desc: "太幸運啦！小隊可以免費去工作人員那裡多抽一個法寶道具。" },
            { text: "【真愛羈絆】(中性)", desc: "被魔法變成了好朋友！小隊裡的四個小朋友必須牽在一起走到下一個關卡。" },
            { text: "【時光封印】(壞)", desc: "糟糕，被時間魔法凍住了！全部的小朋友必須站在原地當木頭人三分鐘。" },
            { text: "【虛空上鎖】(壞)", desc: "觸發了鎖門機關！工作人員必須將這個關卡鎖起來停玩三分鐘。" },
            { text: "【智慧真理】(壞)", desc: "聰明貓頭鷹出現了！小朋友必須正確回答工作人員問的一個問題，剛才過關的分數才算數喔！" }
        ];

        let lastDestinyIndex = -1;

        const itemPool = [
            { name: "【買一送一星星】", detail: "好棒：過關佔領一個點之後，可以直接免費再佔領另一個地點喔！" },
            { name: "【分數變高高】", detail: "好棒：使用後，自動幫你們這個關卡的分數加強！" },
            { name: "【防護防護盾】", detail: "好棒：令自己已占領的遊戲點五分鍾內不能挑戰。" },
            { name: "【旗子換換掉】", detail: "搗蛋：可以把別隊已經插好的旗子，隨機換成另外一隊的。" },
            { name: "【一陣涼風】", detail: "沒事：呼～吹過一陣風，什麼事情都沒發生（這是一張空白卡）。" },
            { name: "【旗子不見了】", detail: "糟糕：大怪獸來了！必須乖乖拔掉你們一面已經佔領的旗子，讓那個地方變成沒有人的。" },
            { name: "【合體魔法】", detail: "糟糕：去玩下一個關卡的時候，要有兩個小朋友手牽著手三分鍾。" }
        ];

        const regionEventsData = {
            "精靈迷航森林": [
                "草叢裡跳出一隻帶著花環的小精靈，拿著發光的蘋果看著你們喔！",
                "你們不小心踩到了一圈會發光的彩色小蘑菇，旁邊飛起了亮晶晶的綠光。",
                "一陣香香的風吹過來，有幾根綠色的藤蔓像小蛇一樣輕輕爬過來。",
                "大樹的樹幹打開了一個小門，裡面傳出好好聽的唱歌聲音。",
                "一隻尾巴會發光的小鹿從你們面前跑過去，還停下來看著你們。"
            ],
            "巨龍隕落廢墟": [
                "大恐龍的骨頭突然亮了起來，掉出了一顆亮晶晶的彩色石頭。",
                "破掉的房子裡面傳來了「呼嚕呼嚕」的聲音，地板開始輕輕震動。",
                "牆壁上畫的奇妙圖案突然發出紅色的光，還發出像金屬敲在一起的聲音。",
                "你們踢到了一個滿是灰塵的舊箱子，箱子跑出了紫色的煙霧。",
                "天空突然飄浮著幾把舊舊的寶劍，在半空中慢慢轉圈圈。"
            ],
            "星光幻影湖泊": [
                "湖水裡面倒映出漂亮的星星，還有一個水做的小透明人跑出來看你們。",
                "水邊的閃亮亮蘆葦發出叮叮噹噹的聲音，像在叫你們過去玩。",
                "水面突然分開了，出現了一條會發出藍色光芒的小路，可以走到水裡喔。",
                "湖面上飄來一艘沒有人的銀色小船，旁邊還有會發光的小水母游來游去。",
                "水裡突然跳出一隻有透明翅膀的飛魚，在空中灑下像亮粉一樣的東西。"
            ],
            "狂風元素高地": [
                "大風在你們面前吹呀吹，變成了一個風做的小精靈擋住你們的路。",
                "天上灰灰的雲突然飛得好低，旁邊一顆飄在半空中的大石頭開始搖晃。",
                "你們腳下的風突然變成了一個小小的龍捲風，把小石頭都捲到半空中。",
                "空氣中發出「劈哩啪啦」的聲音，一隻身上帶著黃色閃電的小鳥飛了下來。",
                "懸崖邊的大柱子開始轉圈圈，還朝天空射出一道好亮的綠色光束。"
            ]
        };

        let mqttClient = null; let starTopic = ""; let selectedTeamColor = "";
        let currentEvent = ""; let currentDestiny = null;

        window.onload = () => {
            const savedConfig = localStorage.getItem('nova_config_kids');
            if (savedConfig) {
                config = JSON.parse(savedConfig);
                document.getElementById('apiKeyInput').value = config.apiKey || "";
                document.getElementById('apiUrlInput').value = config.apiUrl || "https://api.deepseek.com/v1/chat/completions";
                document.getElementById('syncCodeInput').value = config.syncCode || "";
            }
            if(config.syncCode) connectStarNetwork();
            openTeamModal();
            updateUI();
        };

        function switchTab(tabId) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active-nav'));
            if(document.getElementById(tabId)) document.getElementById(tabId).classList.add('active');
            if(document.getElementById('btn-' + tabId)) document.getElementById('btn-' + tabId).classList.add('active-nav');
        }

        // ================= 締結契約全螢幕 =================
        function openTeamModal() { document.getElementById('teamFullscreen').style.display = 'flex'; renderTeamListInModal(); }
        function closeTeamModal() { document.getElementById('teamFullscreen').style.display = 'none'; }

        // ================= 奇遇劇場全螢幕 (兩幕劇控制) =================
        function openEventFullscreen() {
            const teamId = document.getElementById('eventTeamSelect').value;
            if(!teamId) return alert("請先選擇一支準備冒險的隊伍喔！");

            const zone = document.getElementById('zoneSelect').value;
            currentEvent = regionEventsData[zone][Math.floor(Math.random() * regionEventsData[zone].length)];

            let newDestinyIndex = Math.floor(Math.random() * destinies.length);
            while (newDestinyIndex === lastDestinyIndex) { newDestinyIndex = Math.floor(Math.random() * destinies.length); }
            lastDestinyIndex = newDestinyIndex;
            currentDestiny = destinies[newDestinyIndex];

            document.getElementById('fsEventTitle').innerText = `隊伍遇到了...\n「${currentEvent}」`;
            document.getElementById('fsPlayerAction').value = "";

            // 確保每次打開都是第一幕狀態
            document.getElementById('fsEventStep1').style.display = "flex";
            document.getElementById('fsEventStep2').style.display = "none";
            document.getElementById('fsStoryCloseBtn').style.display = "none";

            document.getElementById('eventFullscreen').style.display = 'flex';
        }
        function closeEventFullscreen() { document.getElementById('eventFullscreen').style.display = 'none'; }

        // ================= 光速同步 =================
        function connectStarNetwork() {
            if(!config.syncCode) return;
            const ui = document.getElementById('syncStatusUI');
            starTopic = `nova/universe/kids/${config.syncCode}`;
            if(mqttClient) mqttClient.end();
            mqttClient = mqtt.connect("wss://test.mosquitto.org:8081");
            mqttClient.on("connect", () => {
                ui.style.display = "block"; ui.style.background = '#e8f8f5'; ui.style.borderColor = '#2ecc71'; ui.style.color = '#27ae60';
                ui.innerHTML = `🟢 <b>網路連線成功！房間號碼：【${config.syncCode}】</b>`;
                mqttClient.subscribe(starTopic);
            });
            mqttClient.on("message", (topic, message) => {
                try {
                    const receivedData = JSON.parse(message.toString());
                    if(receivedData.timestamp > gameState.timestamp) {
                        gameState = receivedData; updateUI();
                        const badge = document.getElementById('syncStatus');
                        badge.style.display = 'block'; setTimeout(() => badge.style.display = 'none', 1000);
                    }
                } catch(e) {}
            });
        }
        function syncToCloud() { if(!mqttClient || !starTopic) return; gameState.timestamp = Date.now(); mqttClient.publish(starTopic, JSON.stringify(gameState), { retain: true }); updateUI(); }
        function saveSettings() {
            config.apiKey = document.getElementById('apiKeyInput').value.trim();
            config.apiUrl = document.getElementById('apiUrlInput').value.trim();
            config.syncCode = document.getElementById('syncCodeInput').value.trim();
            if(!config.syncCode) return alert("秘密咒語不能為空！");
            localStorage.setItem('nova_config_kids', JSON.stringify(config)); connectStarNetwork(); alert("設定已儲存！");
        }
        function clearAllData() { if(confirm("確定要重置嗎？")) { gameState.teams = []; gameState.mapPoints.forEach(p => { p.ownerId = ''; p.isLocked = false; }); syncToCloud(); } }

        // ================= 隊伍顏色與新增 =================
        function selectColor(element) { document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected')); element.classList.add('selected'); selectedTeamColor = element.getAttribute('data-color'); }
        function getColorHex(c) { if(c === 'blue') return 'rgba(52, 152, 219, 0.4)'; if(c === 'yellow') return 'rgba(241, 196, 15, 0.4)'; return '#ffffff'; }
        function getDarkColorHex(c) { if(c === 'blue') return '#3498db'; if(c === 'yellow') return '#f1c40f'; return '#ccc'; }
        function addTeam() {
            const name = document.getElementById('newTeamName').value.trim();
            if(!name || !selectedTeamColor) return alert("小法師，請輸入名字並點選顏色喔！");
            gameState.teams.push({ id: Date.now().toString(), name: name, color: selectedTeamColor, items: [] });
            document.getElementById('newTeamName').value = ""; document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected')); selectedTeamColor = "";
            syncToCloud();

            // 自動滾動到底部
            setTimeout(() => {
                const container = document.getElementById('teamListContainer');
                container.scrollTop = container.scrollHeight;
            }, 50);
        }
        function renderTeamListInModal() {
            document.getElementById('teamListContainer').innerHTML = gameState.teams.map(t =>
                `<div style="background:${getColorHex(t.color)}; padding:20px 30px; border-radius:15px; margin-bottom:15px; border:2px solid ${getDarkColorHex(t.color)}; color:white; font-size:24px; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display:flex; justify-content:space-between; align-items:center;">
                    <span>🌟 ${t.name}</span>
                    <span style="font-size:16px; opacity:0.8;">加入星盤！</span>
                </div>`
            ).join('');
        }

        // ================= 地圖與道具 =================
        function changeOwner(pointId, newOwnerId) { const p = gameState.mapPoints.find(p => p.id === pointId); if(p && !p.isLocked) { p.ownerId = newOwnerId; syncToCloud(); } }
        function toggleLock(pointId) { const p = gameState.mapPoints.find(p => p.id === pointId); if(p) { p.isLocked = !p.isLocked; syncToCloud(); } }
        function giveItem() {
            const teamId = document.getElementById('npcTeamSelect').value; if(!teamId) return alert("請先選一個隊伍！");
            const t = gameState.teams.find(t => t.id === teamId); const drawn = itemPool[Math.floor(Math.random() * itemPool.length)];
            t.items.push({ name: drawn.name, desc: drawn.detail, used: false }); syncToCloud();
            document.getElementById('itemResult').innerHTML = `<div style="font-size:16px;">恭喜 <b>${t.name}</b> 抽到了：</div><div style="color:var(--magic); font-size:26px; font-weight:bold; margin:10px 0;">${drawn.name}</div><div style="color:#555; font-size:16px; background:#f4f6f7; padding:10px; border-radius:8px;">📜 ${drawn.detail}</div><hr style="margin: 15px 0;"><span style="color:#27ae60; font-weight:bold;">✔ 已自動放進小包包裡囉！</span>`;
        }
        function openInventory() { document.getElementById('inventoryModal').style.display = 'flex'; renderInventory(); }
        function closeInventory() { document.getElementById('inventoryModal').style.display = 'none'; }
        function useItem(teamId, itemIndex) {
            const t = gameState.teams.find(t => t.id === teamId);
            if(t && confirm(`確定要用掉這個道具嗎？\n用掉之後會畫線做記號喔！`)){ t.items[itemIndex].used = true; syncToCloud(); renderInventory(); }
        }
        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            if(gameState.teams.length === 0) { container.innerHTML = "<p>還沒有任何小隊喔。</p>"; return; }
            container.innerHTML = gameState.teams.map(t => {
                const itemsHtml = t.items.map((itemObj, idx) => {
                    if (itemObj.used) { return `<div class="item-row item-used"><div><span class="item-name" style="font-weight:bold;">🔸 ${itemObj.name}</span><br><span class="item-desc" style="font-size:12px;">${itemObj.desc}</span></div><span style="color:#e74c3c; font-weight:bold; font-size:14px;">(用掉了)</span></div>`; }
                    else { return `<div class="item-row"><div><span class="item-name" style="font-weight:bold; color:var(--primary);">🔸 ${itemObj.name}</span><br><span class="item-desc" style="font-size:12px; color:#555;">${itemObj.desc}</span></div><button onclick="useItem('${t.id}', ${idx})" style="background:#e67e22; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:bold; width:80px;">消耗</button></div>`; }
                }).join('') || `<div style="color:#aaa; font-style:italic; padding: 10px;">包包裡還沒有東西...</div>`;
                return `<div style="margin-bottom:20px; border:2px solid ${getDarkColorHex(t.color)}; border-radius:10px; overflow:hidden;"><div style="background:${getColorHex(t.color)}; padding:10px 15px; font-weight:bold; font-size:18px; color:#2c3e50;">${t.name} 的包包</div><div style="padding:10px;">${itemsHtml}</div></div>`;
            }).join('');
        }

        // ================= AI 事件雙幕劇切換與送出 =================
        async function submitToAIFullscreen() {
            if(!config.apiKey) return alert("要先去神殿中樞設定 API 金鑰才能說故事喔！");
            const action = document.getElementById('fsPlayerAction').value;
            const teamId = document.getElementById('eventTeamSelect').value;
            if(!action || !teamId) return alert("請寫下小朋友做了什麼喔！");

            const activeTeam = gameState.teams.find(t=>t.id===teamId);
            const resultBox = document.getElementById('fsAiResult');

            // 魔法轉場：隱藏第一幕，顯示純粹的第二幕故事畫卷
            document.getElementById('fsEventStep1').style.display = "none";
            document.getElementById('fsEventStep2').style.display = "flex";

            resultBox.innerHTML = "✨ 魔法嚮導正在編織故事...請稍等...<br><br>";

            const systemPrompt = `你是一個帶領小學生玩遊戲的魔法嚮導。
事件：【${currentEvent}】
隊伍【${activeTeam.name}】的反應是：【${action}】。

你的任務：
1. 順著小朋友的動作寫一段約100字的情節（故事部分請用簡單、可愛的童話口吻，適合低年級小朋友，絕不可用成語）。
2. 故事的結果必須合理地導致這個命運發生：【${currentDestiny.desc}】
3. 【最重要限制】：在故事最後一行，請獨立換行並加粗寫上官方判決。此判決「絕對不要」使用任何童言童語，必須使用「客觀、明確的描述性指令」，讓現場的成年工作人員一眼看懂具體操作。
格式範例：【最終判決：${currentDestiny.text}】(執行說明：工作人員請為此隊伍增加分數 / 請要求隊伍原地靜止三分鐘...)`;

            try {
                const response = await fetch(config.apiUrl, {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${config.apiKey}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{"role": "system", "content": systemPrompt}], temperature: 0.8, stream: true })
                });
                if(!response.ok) throw new Error("大腦連結失敗");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ") && line !== "data: [DONE]") {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices[0].delta.content) {
                                    aiText += data.choices[0].delta.content;
                                    resultBox.innerHTML = aiText.replace(/\n/g, '<br>');
                                    // 確保文字一直能看到最新行
                                    resultBox.scrollTop = resultBox.scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
                resultBox.innerHTML += `
                    <hr style="margin:40px 0 20px 0; border: 1px solid rgba(255,255,255,0.2);">
                    <div style="color:#e67e22; font-weight:bold; text-align:center; font-size:20px;">✨ 判決出爐，請聽從工作人員的指示 ✨</div>
                `;
                // 故事講完了，才顯示離開按鈕
                document.getElementById('fsStoryCloseBtn').style.display = "inline-block";

            } catch(e) {
                resultBox.innerText = "魔法連接失敗：" + e.message;
                document.getElementById('fsStoryCloseBtn').style.display = "inline-block";
            }
        }

        // ================= 統一更新畫面 =================
        function updateUI() {
            let teamOptions = `<option value="">-- 請選擇隊伍 --</option>` + gameState.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            document.getElementById('eventTeamSelect').innerHTML = teamOptions;
            document.getElementById('npcTeamSelect').innerHTML = teamOptions;
            let ownerOptions = `<option value="">🏳️ 還沒有人</option>` + gameState.teams.map(t => `<option value="${t.id}">🚩 ${t.name}</option>`).join('');

            document.getElementById('mapContainer').innerHTML = gameState.mapPoints.map(p => {
                const ownerInfo = gameState.teams.find(t => t.id === p.ownerId);
                const bgColor = p.isLocked ? '#ecf0f1' : (ownerInfo ? getColorHex(ownerInfo.color) : '#ffffff');
                const borderColor = p.isLocked ? '#95a5a6' : (ownerInfo ? getDarkColorHex(ownerInfo.color) : '#eee');
                const lockClass = p.isLocked ? 'locked' : '';
                const lockBtnText = p.isLocked ? '🔓 打開' : '🔒 鎖住停玩';
                const lockBtnClass = p.isLocked ? 'lock-btn locked-btn-style' : 'lock-btn';

                return `
                <div class="map-point ${lockClass}" style="background-color: ${bgColor}; border-color: ${borderColor};">
                    <button class="${lockBtnClass}" onclick="toggleLock('${p.id}')">${lockBtnText}</button>
                    <div class="title">${p.name} ${p.isLocked ? '<span style="color:#e74c3c; font-size:16px;">(⛔ 已鎖住)</span>' : ''}</div>
                    <select onchange="changeOwner('${p.id}', this.value)" style="width:100%; padding:10px; font-size:16px;" ${p.isLocked ? 'disabled' : ''}>
                        ${ownerOptions.replace(`value="${p.ownerId}"`, `value="${p.ownerId}" selected`)}
                    </select>
                </div>
            `}).join('');

            if(document.getElementById('teamFullscreen').style.display === 'flex') renderTeamListInModal();
            if(document.getElementById('inventoryModal').style.display === 'flex') renderInventory();
        }
    </script>
</body>
</html>
